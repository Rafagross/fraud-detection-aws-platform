name: Checkov Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/checkov.yml'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  checkov:
    name: Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli
          output_file_path: console
          soft_fail: false
          skip_check: >-
            CKV_AWS_7,
            CKV2_AWS_62
          # CKV_AWS_7: KMS key rotation — enforced via key_rotation_enabled in Terraform
          # CKV2_AWS_62: S3 event notifications — not required for diagnostics bucket

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true
